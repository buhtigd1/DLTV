name: Generate DLTV

on:
  schedule:
    # Every 4 hours — keeps tokenised stream URLs fresh
    - cron: "0 */4 * * *"
  workflow_dispatch:   # allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Run DLTV generator
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
          SUPABASE_REFRESH: ${{ secrets.SUPABASE_REFRESH }}
          DULO_PROFILE_ID: ${{ secrets.DULO_PROFILE_ID }}
        run: python dltv.py

      - name: Commit & push outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dltv.m3u dltv.xml.gz
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
